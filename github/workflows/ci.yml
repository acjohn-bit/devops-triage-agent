name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Format check
        run: gofmt -w main.go workflow.go eval_test.go && git diff --exit-code
      - name: Test
        run: go test ./...
